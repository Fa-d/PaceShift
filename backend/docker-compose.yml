services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: paceshift
      POSTGRES_USER: paceshift
      POSTGRES_PASSWORD: paceshift
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paceshift"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: jdbc:postgresql://db:5432/paceshift
      DATABASE_USER: paceshift
      DATABASE_PASSWORD: paceshift
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS:-}
      APPLE_CLIENT_IDS: ${APPLE_CLIENT_IDS:-com.paceshift.app}
      REVENUECAT_AUTH_TOKEN: ${REVENUECAT_AUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8080:8080"

volumes:
  pgdata:

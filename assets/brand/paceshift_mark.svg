<?xml version="1.0" encoding="UTF-8"?>
<!-- PaceShift logo mark: monoline runner mid-stride + trailing speed streaks.
     Ember #FF5A2C on transparent. Designed on a 1024 grid, centered and scaled
     to sit within the Android adaptive-icon safe zone. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <g fill="none" stroke="#FF5A2C" stroke-linecap="round" stroke-linejoin="round"
     transform="translate(512 512) scale(0.88) translate(-437 -539)">
    <g id="runner">
      <!-- head -->
      <circle cx="666" cy="316" r="62" fill="#FF5A2C" stroke="none"/>
      <!-- torso (forward lean) -->
      <path d="M 638 388 L 458 656" stroke-width="74"/>
      <!-- front arm (pumping forward, bent) -->
      <path d="M 604 462 L 706 504 L 714 404" stroke-width="70"/>
      <!-- back arm (driving back) -->
      <path d="M 604 462 L 504 552" stroke-width="70"/>
      <!-- front leg: landing forward, knee bent, foot planting ahead-low -->
      <path d="M 458 656 L 596 716 L 648 800" stroke-width="74"/>
      <!-- back leg: pushing off back, knee bent, foot low behind -->
      <path d="M 458 656 L 372 724 L 300 780" stroke-width="74"/>
    </g>
    <g id="streaks" stroke-width="48">
      <!-- trailing speed streaks (momentum / shift) -->
      <path d="M 130 430 L 322 430"/>
      <path d="M 96 548 L 320 548"/>
      <path d="M 150 666 L 330 666"/>
    </g>
  </g>
</svg>
